name: "Camofox Browser"
version: "1.0.4"
slug: camofox
description: "Anti-detect headless browser REST API for AI agents — powered by Camoufox (Firefox fork with C++-level fingerprint spoofing). Exposes a JSON REST API; there is no web UI."
url: "https://github.com/mliradelc/camofox-ha-addon"
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: manual
ingress: false
map:
  - addon_config:rw
ports:
  9377/tcp: 9378
ports_description:
  9377/tcp: "Camofox REST API — the primary endpoint for AI agents (POST /tabs, GET /tabs/:id/snapshot, etc.)"
image: ghcr.io/mliradelc/camofox-ha-addon
options:
  git_url: "https://github.com/jo-inc/camofox-browser.git"
  git_ref: ""
  git_cred: ""
  auto_update: false
  api_port: 9377
  api_cred: ""
  max_memory: 128
schema:
  git_url: "str"
  git_ref: "str?"
  git_cred: "str?"
  auto_update: "bool"
  api_port: "port"
  api_cred: "password?"
  max_memory: "int(64,2048)"
